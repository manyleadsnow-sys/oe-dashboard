name: Daily OE Calculation

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 7am EST = 11am UTC, Mon-Fri
  workflow_dispatch:
    inputs:
      force_edgar:
        description: 'Force a full EDGAR data refresh? (yes/no)'
        required: true
        default: 'no'

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calculation
        run: python calculator.py --force ${{ github.event.inputs.force_edgar }}

      - name: Copy dashboard files for Pages
        run: |
          mkdir -p _site
          cp index.html _site/
          cp oe_data.json _site/

      - name: Commit updated data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oe_data.json
          git commit -m "Daily OE update $(date +'%Y-%m-%d')" || echo "No changes"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: calculate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
