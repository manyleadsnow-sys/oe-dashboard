<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Earnings Dossier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090e; --bg2: #15151f; --bg3: #1e1e2e;
    --text: #cdd6f4; --muted: #a6adc8; --accent: #89b4fa;
    --red: #f38ba8; --green: #a6e3a1; --yellow: #f9e2af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 40px; }
  
  header { margin-bottom: 40px; border-bottom: 1px solid var(--bg3); padding-bottom: 20px; }
  h1 { color: var(--accent); font-family: 'DM Mono', monospace; }
  
  .controls { margin-bottom: 30px; display: flex; gap: 15px; }
  input, select { background: var(--bg2); color: var(--text); border: 1px solid var(--bg3); padding: 10px; border-radius: 6px; font-family: 'DM Mono', monospace; }
  
  .dossier-card { background: var(--bg2); border: 1px solid var(--bg3); border-radius: 12px; padding: 30px; margin-bottom: 40px; }
  .ticker-header { display: flex; align-items: baseline; gap: 15px; margin-bottom: 10px; }
  .ticker-sym { font-size: 24px; font-weight: bold; color: var(--accent); font-family: 'DM Mono', monospace;}
  .company-name { font-size: 20px; color: var(--text); }
  
  .price-banner { background: var(--bg3); padding: 15px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 16px; margin-bottom: 25px; display: inline-block; }
  .peak-price { color: var(--yellow); }
  .current-price { color: var(--green); }

  .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 30px 0 15px 0; border-bottom: 1px solid var(--bg3); padding-bottom: 5px;}
  
  .comparison-row { display: grid; grid-template-columns: 200px 150px 40px 150px; align-items: center; padding: 8px 0; border-bottom: 1px dashed #2a2a3e; font-family: 'DM Mono', monospace; font-size: 14px; }
  .comp-label { color: var(--muted); }
  .comp-val1 { color: var(--yellow); font-weight: bold; }
  .comp-vs { color: #585b70; text-align: center; font-size: 12px; }
  .comp-val2 { color: var(--text); font-weight: bold; }
  
  .dca-badge { float: right; padding: 8px 16px; background: var(--bg); border: 1px solid var(--accent); border-radius: 20px; font-weight: bold; font-family: 'DM Mono', monospace;}
</style>
</head>
<body>

<header>
  <h1>Owner Earnings Dossier</h1>
  <p style="color:var(--muted); margin-top:10px;">Deep-dive crisis metrics (Post-2015)</p>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search Ticker (e.g. AAPL)">
  <select id="sector-filter"><option value="">All Sectors</option></select>
</div>

<div id="dossier-container">Loading data...</div>

<script>
let RAW = {};
let ROWS = [];

const fmt = {
  price: v => v != null ? `$${v.toFixed(2)}` : 'N/A',
  oeps:  v => v != null ? `$${v.toFixed(2)}` : 'N/A',
  mult:  v => v != null ? `${v.toFixed(2)}x` : 'N/A',
  yield: v => v != null ? `${v.toFixed(2)}%` : 'N/A',
  peg:   v => v != null ? `${v.toFixed(2)}x` : 'N/A'
};

function renderCards(data) {
  const container = document.getElementById('dossier-container');
  if (!data.length) { container.innerHTML = "No tickers found."; return; }

  container.innerHTML = data.map(r => {
    if(r.error && !r.current.price) return ``; // Skip total failures

    let c = r.current || {};
    let p = r.peak_since_oct2022 || {};
    let bears = r.bear_markets || [];

    // LATEST PEAK VS CURRENT BLOCK
    let latestBlock = `
      <div class="section-title">- Latest price peak vs current situation -</div>
      <div class="comparison-row"><span class="comp-label">OE per share</span><span class="comp-val1">${fmt.oeps(p.oeps)}</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.oeps(c.oeps)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE Multiple</span><span class="comp-val1">${fmt.mult(p.oe_multiple)}</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.mult(c.oe_multiple)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE Yield</span><span class="comp-val1">${fmt.yield(p.oe_yield)}</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.yield(c.oe_yield)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE Growth Rate</span><span class="comp-val1">${fmt.yield(p.oe_growth)}</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.yield(c.oe_growth)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE-PEG Ratio</span><span class="comp-val1">${fmt.peg(p.oe_peg)}</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.peg(c.oe_peg)}</span></div>
    `;

    // CRISIS BLOCKS
    let crisisBlocks = bears.map((b, i) => `
      <div class="section-title">- Pre-Crisis Peak (${b.peak_date}) vs Trough (${b.trough_date}) [▼${b.drawdown_pct}%] -</div>
      <div class="comparison-row"><span class="comp-label">OE per share</span><span class="comp-val1">Prior Peak</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.oeps(b.oeps)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE Multiple</span><span class="comp-val1">Prior Peak</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.mult(b.oe_multiple)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE Yield</span><span class="comp-val1">Prior Peak</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.yield(b.oe_yield)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE Growth Rate</span><span class="comp-val1">Prior Peak</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.yield(b.oe_growth)}</span></div>
      <div class="comparison-row"><span class="comp-label">OE-PEG Ratio</span><span class="comp-val1">Prior Peak</span><span class="comp-vs">vs</span><span class="comp-val2">${fmt.peg(b.oe_peg)}</span></div>
    `).join('');

    return `
    <div class="dossier-card">
      <div class="dca-badge">${r.dca_signal || 'WAIT'}</div>
      <div class="ticker-header">
        <div class="ticker-sym">${r.ticker}</div>
        <div class="company-name">${r.company_name || r.ticker}</div>
      </div>
      <div class="price-banner">
        Peak Price <span class="peak-price">${fmt.price(p.price)}</span> &nbsp;vs&nbsp; Current Price <span class="current-price">${fmt.price(c.price)}</span>
      </div>
      ${latestBlock}
      ${crisisBlocks}
    </div>`;
  }).join('');
}

function refresh() {
  const search = document.getElementById('search').value.trim().toUpperCase();
  const sector = document.getElementById('sector-filter').value;
  
  let filtered = ROWS.filter(r => {
    if (search && !r.ticker.includes(search)) return false;
    if (sector && r.sector !== sector) return false;
    return true;
  });
  renderCards(filtered);
}

document.getElementById('search').addEventListener('input', refresh);
document.getElementById('sector-filter').addEventListener('change', refresh);

async function loadData() {
  try {
    const res = await fetch('oe_data.json?nocache=' + Date.now());
    RAW = await res.json();
    ROWS = Object.values(RAW).sort((a,b) => a.ticker.localeCompare(b.ticker));
    
    // Populate sectors
    const sectors = [...new Set(ROWS.map(r => r.sector).filter(s => s && s !== 'default'))].sort();
    sectors.forEach(s => {
      let o = document.createElement('option'); o.value = s; o.textContent = s;
      document.getElementById('sector-filter').appendChild(o);
    });

    refresh();
  } catch(e) {
    document.getElementById('dossier-container').innerHTML = "Run calculator.py to generate data.";
  }
}
loadData();
</script>
</body>
</html>
